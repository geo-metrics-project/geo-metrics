replicaCount: 1

image:
  repository: ghcr.io/geo-metrics-project/geo-metrics/frontend
  tag: "latest"
  pullPolicy: Always
  containerPort: 3000

service:
  type: ClusterIP
  port: 3000

env:
  nextPublicKratosUrl: "https://kratos.combaldieu.fr"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
      - ALL

livenessProbe:
  path: /
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  path: /
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
