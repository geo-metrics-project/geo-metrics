replicaCount: 1

image:
  repository: ghcr.io/geo-metrics-project/geo-metrics/llm-worker
  tag: "latest"
  pullPolicy: Always

env:
  natsUrl: "nats://nats:4222"
  natsStream: "REPORTS"
  natsDurable: "llm-service-consumer"
  natsConsumeSubject: "reports.created"
  natsPublishSubject: "llm.response"
  natsNakDelay: "5s"
  huggingFaceModel: "meta-llama/Llama-2-7b-chat-hf"
  maxConcurrency: "5"
  hfMaxRetries: "3"
  hfRetryInitialBackoff: "2s"
  hfMaxResponseBytes: "1048576"
  huggingFaceSecretName: "llm-worker-auth"
  huggingFaceApiKeyKey: "huggingface-api-key"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
