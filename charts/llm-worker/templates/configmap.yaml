apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-worker.fullname" . }}
  labels:
    {{- include "llm-worker.labels" . | nindent 4 }}
data:
  NATS_URL: {{ .Values.env.natsUrl | quote }}
  NATS_STREAM: {{ .Values.env.natsStream | quote }}
  NATS_DURABLE: {{ .Values.env.natsDurable | quote }}
  NATS_CONSUME_SUBJECT: {{ .Values.env.natsConsumeSubject | quote }}
  NATS_PUBLISH_SUBJECT: {{ .Values.env.natsPublishSubject | quote }}
  NATS_NAK_DELAY: {{ .Values.env.natsNakDelay | quote }}
  HUGGINGFACE_MODEL: {{ .Values.env.huggingFaceModel | quote }}
  MAX_CONCURRENCY: {{ .Values.env.maxConcurrency | quote }}
  HF_MAX_RETRIES: {{ .Values.env.hfMaxRetries | quote }}
  HF_RETRY_INITIAL_BACKOFF: {{ .Values.env.hfRetryInitialBackoff | quote }}
  HF_MAX_RESPONSE_BYTES: {{ .Values.env.hfMaxResponseBytes | quote }}
