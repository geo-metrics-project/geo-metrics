apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-worker.fullname" . }}
  labels:
    {{- include "llm-worker.labels" . | nindent 4 }}
data:
  NATS_URL: {{ .Values.env.natsUrl | quote }}
  NATS_STREAM: {{ .Values.env.natsStream | quote }}
  NATS_CONSUMER: {{ .Values.env.natsConsumer | quote }}
  NATS_CONSUME_SUBJECT: {{ .Values.env.natsConsumeSubject | quote }}
  NATS_RESULT_SUBJECT: {{ .Values.env.natsResultSubject | quote }}
  NATS_ERROR_SUBJECT: {{ .Values.env.natsErrorSubject | quote }}
  LLM_API_URL: {{ .Values.env.llmApiUrl | quote }}
  LLM_API_KEY: {{ .Values.env.llmApiKey | quote }}
