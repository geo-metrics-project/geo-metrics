replicaCount: 1

image:
  repository: ghcr.io/geo-metrics-project/geo-metrics/report-query-api
  tag: "latest"
  pullPolicy: Always
  containerPort: 8080

service:
  type: ClusterIP
  port: 8080

env:
  port: "8080"
  postgresHost: "postgres-postgresql"
  postgresPort: "5432"
  postgresDb: "geometrics"
  postgresUser: "geometrics"
  postgresSslMode: "disable"
  ketoReadUrl: "http://keto-read.geo-ory.svc.cluster.local:4466"
  ketoNamespace: "Report"
  postgresAuthSecretName: "postgres-auth"
  postgresAuthPasswordKey: "password"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  path: /api/health
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  path: /api/health
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
