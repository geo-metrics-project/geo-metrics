replicaCount: 1

image:
  repository: ghcr.io/geo-metrics-project/geo-metrics/translation-worker
  tag: "latest"
  pullPolicy: Always

env:
  natsUrl: "nats://nats:4222"
  natsStream: "PLANNER"
  natsConsumer: "translation-worker-jobs"
  natsConsumeSubject: "planner.translation.job.created"
  natsResultSubject: "reports.translation.completed"
  natsErrorSubject: "reports.translation.failed"
  libretranslateUrl: "http://libretranslate:5000"
  libretranslateSourceLang: "en"
  libretranslateApiKey: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 400m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
