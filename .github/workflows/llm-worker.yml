name: Build and Push LLM Worker

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'llm-worker/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'llm-worker/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push LLM Worker Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./llm-worker
          push: true
          tags: ghcr.io/${{ github.repository }}/llm-worker:latest
