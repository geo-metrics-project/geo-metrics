name: Build and Push Report Query API

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'report-query-api/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'report-query-api/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Report Query API Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./report-query-api
          push: true
          tags: ghcr.io/${{ github.repository }}/report-query-api:latest
