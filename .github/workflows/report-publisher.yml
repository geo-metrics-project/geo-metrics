name: Build and Push Report Publisher

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:  # Allow manual triggering
  push:
    branches: [ master ]
    paths: [ 'report-publisher/**' ]  # Only trigger on report-publisher changes
  pull_request:
    branches: [ master ]
    paths: [ 'report-publisher/**' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Report Publisher Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./report-publisher
        push: true
        tags: ghcr.io/${{ github.repository }}/report-publisher:latest