# PostgreSQL Helm values for GEO-Metrics

auth:
  username: geometrics
  database: geometrics
  existingSecret: postgres-auth
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: password

primary:
  persistence:
    enabled: true
    size: 2Gi
  initdb:
    scripts:
      01-schema.sql: |
        -- Database initialization for GEO-Metrics
        -- User and database are created by Bitnami Helm chart via auth.* values
        -- This script defines an event-driven schema for JetStream consumers.

        -- Keep updated_at in sync automatically.
        CREATE OR REPLACE FUNCTION set_updated_at()
        RETURNS TRIGGER AS $$
        BEGIN
            NEW.updated_at = CURRENT_TIMESTAMP;
            RETURN NEW;
        END;
        $$ LANGUAGE plpgsql;

        -- Reports table keyed by externally generated IDs.
        CREATE TABLE IF NOT EXISTS reports (
            id TEXT PRIMARY KEY,
            source_event_id TEXT NOT NULL UNIQUE,
            brand_name VARCHAR(255) NOT NULL,
            competitor_names TEXT[],
            models TEXT[] NOT NULL,
            keywords TEXT[] NOT NULL,
            regions TEXT[] NOT NULL,
            languages TEXT[] NOT NULL,
            prompt_templates TEXT[] NOT NULL,
            status VARCHAR(20) NOT NULL DEFAULT 'pending',
            user_id TEXT,
            occurred_at TIMESTAMPTZ NOT NULL,
            created_at TIMESTAMPTZ NOT NULL DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMPTZ NOT NULL DEFAULT CURRENT_TIMESTAMP,
            CONSTRAINT reports_status_check CHECK (
                status IN ('pending', 'processing', 'completed', 'failed', 'cancelled')
            )
        );

        DROP TRIGGER IF EXISTS trg_reports_updated_at ON reports;
        CREATE TRIGGER trg_reports_updated_at
        BEFORE UPDATE ON reports
        FOR EACH ROW
        EXECUTE FUNCTION set_updated_at();

        -- Store LLM responses and processing state for each unique combination.
        CREATE TABLE IF NOT EXISTS llm_responses (
            id SERIAL PRIMARY KEY,
            report_id TEXT NOT NULL REFERENCES reports(id) ON DELETE CASCADE,
            source_event_id TEXT NOT NULL,
            prompt_template TEXT NOT NULL,
            region VARCHAR(100) NOT NULL,
            language_code VARCHAR(10) NOT NULL,
            keyword VARCHAR(255) NOT NULL,
            model VARCHAR(255) NOT NULL,
            prompt_text TEXT NOT NULL,
            response TEXT,
            kpis JSONB DEFAULT '{}'::jsonb,
            status VARCHAR(20) NOT NULL DEFAULT 'pending',
            error_message TEXT,
            retry_count INTEGER NOT NULL DEFAULT 0,
            occurred_at TIMESTAMPTZ NOT NULL,
            created_at TIMESTAMPTZ NOT NULL DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMPTZ NOT NULL DEFAULT CURRENT_TIMESTAMP,
            completed_at TIMESTAMPTZ,
            CONSTRAINT llm_responses_status_check CHECK (
                status IN ('pending', 'processing', 'completed', 'failed', 'cancelled')
            ),
            -- Protect against redelivery duplicates for the same business unit of work.
            CONSTRAINT uq_llm_response_business_key UNIQUE (
                report_id, prompt_template, region, language_code, keyword, model
            )
        );

        DROP TRIGGER IF EXISTS trg_llm_responses_updated_at ON llm_responses;
        CREATE TRIGGER trg_llm_responses_updated_at
        BEFORE UPDATE ON llm_responses
        FOR EACH ROW
        EXECUTE FUNCTION set_updated_at();

        CREATE INDEX IF NOT EXISTS idx_llm_responses_report ON llm_responses(report_id);
        CREATE INDEX IF NOT EXISTS idx_llm_responses_language ON llm_responses(language_code);
        CREATE INDEX IF NOT EXISTS idx_llm_responses_keyword ON llm_responses(keyword);
        CREATE INDEX IF NOT EXISTS idx_llm_responses_source_event ON llm_responses(source_event_id);
        CREATE INDEX IF NOT EXISTS idx_llm_responses_status ON llm_responses(status);
        CREATE INDEX IF NOT EXISTS idx_reports_status ON reports(status);

        -- Grant permissions to geometrics user
        GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO geometrics;
        GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO geometrics;

service:
  type: ClusterIP
  ports:
    postgresql: 5432
