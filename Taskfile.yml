version: '3'

vars:
  NAMESPACE: geo-metrics

tasks:

  deploy:postgres:
    desc: Deploy PostgreSQL via Helm
    cmds:
      - |
        test -n "$POSTGRES_ADMIN_PASSWORD" || (echo "POSTGRES_ADMIN_PASSWORD is required" && exit 1)
        test -n "$POSTGRES_APP_PASSWORD" || (echo "POSTGRES_APP_PASSWORD is required" && exit 1)
      - |
        kubectl create secret generic postgres-auth \
          -n {{.NAMESPACE}} \
          --from-literal=postgres-password="$POSTGRES_ADMIN_PASSWORD" \
          --from-literal=password="$POSTGRES_APP_PASSWORD" \
          --dry-run=client -o yaml | kubectl apply -f -
      - helm repo add bitnami https://charts.bitnami.com/bitnami
      - helm repo update
      - helm upgrade --install postgres bitnami/postgresql
          -n {{.NAMESPACE}}
          -f infra/postgres/values.yaml
          --wait --timeout 300s

  deploy:nats:
    desc: Deploy NATS via Helm
    cmds:
      - helm repo add nats https://nats-io.github.io/k8s/helm/charts
      - helm repo update
      - helm upgrade --install nats nats/nats
          -n {{.NAMESPACE}}
          -f infra/nats/values.yaml
          --wait --timeout 300s
      - kubectl apply -f infra/nats/stream-setup.yaml -n {{.NAMESPACE}}
      - kubectl wait --for=condition=complete job/nats-stream-setup
          -n {{.NAMESPACE}} --timeout=60s

  deploy:report-publisher:
    desc: Deploy report service
    cmds:
      - helm upgrade --install report-publisher ./charts/report-publisher
          -n {{.NAMESPACE}}
          --wait --timeout 120s

  deploy:services:
    desc: Deploy all services
    deps: [deploy:report-publisher]

  deploy:infra:
    desc: Deploy all infrastructure
    deps: [deploy:nats, deploy:postgres]

  deploy:all:
    desc: Deploy everything
    cmds:
      - task: deploy:infra
      - task: deploy:services

  logs:report-publisher:
    desc: Tail report service logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=report-publisher -n {{.NAMESPACE}}

  restart:report-publisher:
    desc: Restart report service
    cmds:
      - kubectl rollout restart deployment/report-publisher -n {{.NAMESPACE}}

  status:
    desc: Show status of all deployments
    cmds:
      - kubectl get pods -n {{.NAMESPACE}}