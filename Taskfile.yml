version: '3'

vars:
  NAMESPACE: geo-metrics

tasks:

  deploy:postgres:
    desc: Deploy PostgreSQL via Helm
    cmds:
      - helm repo add bitnami https://charts.bitnami.com/bitnami
      - helm repo update
      - helm upgrade --install postgres bitnami/postgresql
          -n {{.NAMESPACE}}
          -f infra/postgres/values.yaml
          --wait --timeout 300s

  deploy:nats:
    desc: Deploy NATS via Helm
    cmds:
      - helm repo add nats https://nats-io.github.io/k8s/helm/charts
      - helm repo update
      - helm upgrade --install nats nats/nats
          -n {{.NAMESPACE}}
          -f infra/nats/values.yaml
          --wait --timeout 300s
      - kubectl apply -f infra/nats/stream-setup.yaml -n {{.NAMESPACE}}
      - kubectl wait --for=condition=complete job/nats-stream-setup
          -n {{.NAMESPACE}} --timeout=60s

  deploy:libretranslate:
    desc: Deploy LibreTranslate via Helm
    cmds:
      - helm repo add libretranslate https://libretranslate.github.io/helm-chart/
      - helm repo update
      - helm upgrade --install libretranslate libretranslate/libretranslate
          -n {{.NAMESPACE}}
          -f infra/libretranslate/values.yaml
          --wait --timeout 300s

  deploy:report-publisher:
    desc: Deploy report service
    cmds:
      - helm upgrade --install report-publisher ./charts/report-publisher
          -n {{.NAMESPACE}}
          --wait --timeout 120s

  deploy:report-consumer:
    desc: Deploy report consumer service
    cmds:
      - helm upgrade --install report-consumer ./charts/report-consumer
          -n {{.NAMESPACE}}
          --wait --timeout 120s

  deploy:services:
    desc: Deploy all services
    deps: [deploy:report-publisher, deploy:report-consumer]

  deploy:infra:
    desc: Deploy all infrastructure
    deps: [deploy:nats, deploy:postgres]

  deploy:all:
    desc: Deploy everything
    cmds:
      - task: deploy:infra
      - task: deploy:services

  restart:report-publisher:
    desc: Restart report service
    cmds:
      - kubectl rollout restart deployment/report-publisher -n {{.NAMESPACE}}

  restart:report-consumer:
    desc: Restart report consumer service
    cmds:
      - kubectl rollout restart deployment/report-consumer -n {{.NAMESPACE}}

  status:
    desc: Show status of all deployments
    cmds:
      - kubectl get pods -n {{.NAMESPACE}}